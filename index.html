<!doctype html>
<html lang="id" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chibi Craft</title>
    <meta
      name="description"
      content="Chibi Craft menghadirkan gelang manik-manik handmade dengan desain cute, colorful, dan bisa custom nama."
    />
    <meta
      name="keywords"
      content="gelang handmade, gelang manik, gelang custom name, chibi craft, gelang anak"
    />
    <meta name="author" content="Chibi Craft" />
    <meta property="og:title" content="Chibi Craft" />
    <meta
      property="og:description"
      content="Little Things, Lovely Feelings - Gelang manik handmade lucu untuk anak dan remaja."
    />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#f8b4d9" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              display: ["Quicksand", "sans-serif"],
              body: ["Nunito", "sans-serif"],
            },
            colors: {
              blush: "#f8b4d9",
              sky: "#bfe8ff",
              lilac: "#d9c8ff",
              mint: "#cbf5df",
            },
            boxShadow: {
              dreamy: "0 10px 30px rgba(248, 180, 217, 0.35)",
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      .bg-fancy {
        background:
          radial-gradient(circle at 10% 20%, rgba(248, 180, 217, 0.28), transparent 42%),
          radial-gradient(circle at 90% 10%, rgba(191, 232, 255, 0.34), transparent 38%),
          radial-gradient(circle at 30% 80%, rgba(217, 200, 255, 0.28), transparent 42%),
          linear-gradient(180deg, #fffdfd 0%, #fbfdff 100%);
      }

      .dark .bg-fancy {
        background:
          radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.22), transparent 42%),
          radial-gradient(circle at 90% 10%, rgba(56, 189, 248, 0.22), transparent 38%),
          linear-gradient(180deg, #1e293b 0%, #334155 100%);
      }

      .fade-item {
        opacity: 0;
        transform: translateY(24px);
        transition: opacity 0.8s ease, transform 0.8s ease;
      }

      .fade-item.show {
        opacity: 1;
        transform: translateY(0);
      }

      .attention-pulse {
        animation: pulseRing 1.8s ease-in-out infinite;
      }

      @keyframes pulseRing {
        0% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(236, 72, 153, 0.38);
        }
        70% {
          transform: scale(1.03);
          box-shadow: 0 0 0 14px rgba(236, 72, 153, 0);
        }
        100% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(236, 72, 153, 0);
        }
      }
    </style>
  </head>
  <body class="bg-fancy font-body text-slate-700 dark:text-slate-200">
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useEffect, useState } = React;

      const waNumber = "6285946267618";
      const instagramUrl = "https://www.instagram.com/chibi_craft.id?igsh=ajByZnkzeXd4dG45";

      const favoriteProducts = [
        {
          name: "Gelang Pastel",
          price: "Rp10.000",
          desc: "Warna lembut yang manis untuk daily look.",
          badge: "Best Seller",
        },
        {
          name: "Gelang Custom Name",
          price: "Rp15.000 - Rp25.000",
          desc: "Pilih nama sendiri, jadi hadiah yang personal.",
          badge: "Custom",
        },
        {
          name: "Gelang Manik Tema",
          price: "Rp25.000 - Rp45.000",
          desc: "Bisa request tema anime, zodiak, atau berdasarkan mood favoritmu.",
          badge: "Tema Request",
        },
      ];
      const limitedEdition = {
        name: "Gelang Limited Edition",
        price: "Rp20.000 - Rp50.000",
        desc: "Sistem pre-order (PO) per bulan dengan desain eksklusif dan jumlah sangat terbatas.",
        badge: "Limited PO",
      };

      function App() {
        const [dark, setDark] = useState(localStorage.getItem("theme") === "dark");
        const [form, setForm] = useState({ name: "", email: "", message: "" });

        useEffect(() => {
          document.documentElement.classList.toggle("dark", dark);
          localStorage.setItem("theme", dark ? "dark" : "light");
        }, [dark]);

        useEffect(() => {
          const observer = new IntersectionObserver(
            (entries) => {
              entries.forEach((entry) => {
                if (entry.isIntersecting) entry.target.classList.add("show");
              });
            },
            { threshold: 0.16 }
          );

          document.querySelectorAll(".fade-item").forEach((el) => observer.observe(el));
          return () => observer.disconnect();
        }, []);

        const pastel = favoriteProducts[0];
        const customName = favoriteProducts[1];
        const themed = favoriteProducts[2];
        const limitedMsg = encodeURIComponent(`Halo saya ingin pesan ${limitedEdition.name} (PO bulan ini)`);
        const limitedWaLink = `https://wa.me/${waNumber}?text=${limitedMsg}`;

        const onSubmit = (e) => {
          e.preventDefault();
          if (!form.name.trim() || !form.email.trim() || !form.message.trim()) {
            alert("Semua field wajib diisi.");
            return;
          }

          const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email);
          if (!emailOk) {
            alert("Format email tidak valid.");
            return;
          }

          alert("Terima kasih! Pesan kamu sudah terkirim.");
          setForm({ name: "", email: "", message: "" });
        };

        return (
          <>
            <header className="sticky top-0 z-40 border-b border-white/50 bg-white/75 backdrop-blur-xl dark:border-slate-700 dark:bg-slate-900/80">
              <nav className="mx-auto flex w-full max-w-6xl flex-col gap-3 px-4 py-3 md:flex-row md:items-center md:justify-between md:px-6">
                <a href="#home" className="flex items-center gap-2 rounded-full px-2 py-1 hover:bg-pink-100/70 dark:hover:bg-slate-800">
                  <img
                    src="LOGO CHIBI.jpeg"
                    alt="Logo Chibi Craft"
                    className="h-10 w-10 rounded-full border border-pink-200 object-cover dark:border-slate-600"
                  />
                  <span className="font-display text-xl font-bold text-pink-500 dark:text-pink-300">Chibi Craft</span>
                </a>
                <div className="flex w-full flex-wrap items-center justify-center gap-2 md:w-auto md:justify-end md:gap-4">
                  <a href="#produk" className="rounded-full px-3 py-1.5 text-xs font-semibold hover:bg-pink-100 dark:hover:bg-slate-800 md:text-sm">
                    Produk
                  </a>
                  <a href="#kontak" className="rounded-full px-3 py-1.5 text-xs font-semibold hover:bg-pink-100 dark:hover:bg-slate-800 md:text-sm">
                    Kontak
                  </a>
                  <a
                    href="#instagram"
                    className="rounded-full px-3 py-1.5 text-xs font-semibold hover:bg-pink-100 dark:hover:bg-slate-800 md:text-sm"
                  >
                    Instagram
                  </a>
                  <button
                    onClick={() => setDark((v) => !v)}
                    className="rounded-full bg-slate-800 px-4 py-1.5 text-xs font-semibold text-white transition hover:scale-105 dark:bg-yellow-300 dark:text-slate-900 md:text-sm"
                    aria-label="Toggle dark mode"
                  >
                    {dark ? "Light" : "Dark"}
                  </button>
                </div>
              </nav>
            </header>

            <main>
              <section id="home" className="mx-auto grid max-w-6xl items-center gap-8 px-4 py-12 md:grid-cols-2 md:gap-10 md:py-16 md:px-6">
                <div className="fade-item space-y-5">
                  <p className="inline-flex rounded-full bg-pink-100 px-4 py-2 text-sm font-bold text-pink-600 dark:bg-pink-900/40 dark:text-pink-200">
                    Little Things, Lovely Feelings
                  </p>
                  <h1 className="font-display text-3xl font-bold leading-tight text-slate-800 dark:text-white sm:text-4xl md:text-5xl">
                    Gelang Manik Handmade yang <span className="text-pink-500">Cute</span> dan Personal
                  </h1>
                  <p className="text-base text-slate-600 dark:text-slate-300 md:text-lg">
                    Pilih warna favoritmu atau custom nama sendiri. Handmade, colorful, dan cocok untuk anak hingga remaja.
                  </p>
                  <div className="flex flex-wrap gap-3">
                    <a
                      href="#produk"
                      className="rounded-full bg-pink-500 px-6 py-3 font-bold text-white shadow-dreamy transition hover:-translate-y-0.5 hover:bg-pink-600"
                    >
                      Lihat Koleksi
                    </a>
                    <span className="rounded-full bg-white/80 px-5 py-3 font-bold text-slate-700 dark:bg-slate-800 dark:text-slate-100">
                      Harga Rp10.000 - Rp50.000
                    </span>
                  </div>
                </div>

                <div className="fade-item relative rounded-[2rem] border border-white/70 bg-white/70 p-5 shadow-dreamy backdrop-blur dark:border-slate-700 dark:bg-slate-800/70 md:p-6">
                  <div className="grid grid-cols-2 gap-3 md:gap-4">
                    <div className="rounded-3xl bg-pink-100 p-4 text-center text-sm font-semibold dark:bg-pink-900/30 md:p-6 md:text-base">🌸 Pastel</div>
                    <div className="rounded-3xl bg-sky/80 p-4 text-center text-sm font-bold text-sky-900 dark:bg-sky-900/60 dark:text-sky-100 md:p-6 md:text-base">
                      🎀 Limited Edition PO
                    </div>
                    <div className="rounded-3xl bg-lilac p-4 text-center text-sm font-semibold dark:bg-violet-900/30 md:p-6 md:text-base">✨ Custom Name</div>
                    <div className="rounded-3xl bg-mint p-4 text-center text-sm font-semibold dark:bg-emerald-900/30 md:p-6 md:text-base">🧵 Handmade</div>
                  </div>
                </div>
              </section>

              <section className="mx-auto max-w-6xl px-4 md:px-6">
                <div className="fade-item attention-pulse relative -mt-2 overflow-hidden rounded-[2rem] border-2 border-pink-300 bg-gradient-to-r from-pink-200/85 via-lilac/75 to-sky/85 p-6 shadow-dreamy dark:border-pink-300/60 dark:from-pink-900/55 dark:via-violet-900/45 dark:to-sky-900/45 md:-mt-4 md:p-8">
                  <span className="mb-3 inline-flex rounded-full bg-pink-500 px-3 py-1 text-xs font-extrabold uppercase tracking-wide text-white md:absolute md:right-4 md:top-4 md:mb-0">
                    Hot: PO Bulan Ini
                  </span>
                  <p className="text-sm font-extrabold uppercase tracking-wider text-pink-600 dark:text-pink-200">Spotlight Product</p>
                  <h2 className="mt-2 font-display text-2xl font-bold text-slate-800 dark:text-white sm:text-3xl md:text-4xl">
                    {limitedEdition.name}
                  </h2>
                  <p className="mt-3 max-w-3xl text-slate-700 dark:text-slate-200">{limitedEdition.desc}</p>
                  <div className="mt-4 flex flex-wrap items-center gap-3">
                    <span className="rounded-full bg-white/85 px-4 py-2 text-sm font-extrabold text-pink-600 dark:bg-slate-900/60 dark:text-pink-200">
                      {limitedEdition.price}
                    </span>
                    <span className="rounded-full bg-slate-800 px-4 py-2 text-sm font-bold text-white dark:bg-slate-100 dark:text-slate-900">
                      Tutup PO setiap akhir bulan
                    </span>
                    <a
                      href={limitedWaLink}
                      target="_blank"
                      rel="noreferrer"
                      className="rounded-full bg-pink-500 px-5 py-2.5 text-sm font-bold text-white transition hover:bg-pink-600"
                    >
                      Ikut Pre-Order
                    </a>
                  </div>
                </div>
              </section>

              <section id="produk" className="mx-auto max-w-6xl px-4 py-16 md:px-6">
                <div className="fade-item mb-10 text-center">
                  <h2 className="font-display text-3xl font-bold text-slate-800 dark:text-white md:text-4xl">Produk Favorit</h2>
                  <p className="mt-3 text-slate-600 dark:text-slate-300">Desain lucu, ringan dipakai, dan bisa request sesuai selera.</p>
                </div>

                <div className="grid gap-6 md:grid-cols-3">
                  <article className="fade-item group rounded-[1.8rem] border border-white/70 bg-white/80 p-6 shadow-lg transition duration-300 hover:-translate-y-2 hover:shadow-dreamy dark:border-slate-700 dark:bg-slate-800/80 md:col-start-1">
                    <span className="mb-4 inline-block rounded-full bg-lilac px-3 py-1 text-xs font-bold text-violet-700 dark:bg-violet-900/50 dark:text-violet-200">
                      {pastel.badge}
                    </span>
                    <h3 className="font-display text-2xl font-bold text-slate-800 dark:text-white">{pastel.name}</h3>
                    <p className="mt-2 min-h-[48px] text-slate-600 dark:text-slate-300">{pastel.desc}</p>
                    <p className="mt-4 text-xl font-extrabold text-pink-500">{pastel.price}</p>
                    <a
                      href={`https://wa.me/${waNumber}?text=${encodeURIComponent(`Halo saya ingin pesan ${pastel.name}`)}`}
                      target="_blank"
                      rel="noreferrer"
                      className="mt-5 inline-flex rounded-full bg-slate-800 px-5 py-2.5 text-sm font-bold text-white transition group-hover:bg-pink-500 dark:bg-slate-100 dark:text-slate-900"
                    >
                      Pesan Sekarang
                    </a>
                  </article>

                  <article className="fade-item group rounded-[1.8rem] border border-white/70 bg-white/80 p-6 shadow-lg transition duration-300 hover:-translate-y-2 hover:shadow-dreamy dark:border-slate-700 dark:bg-slate-800/80 md:col-start-2">
                    <span className="mb-4 inline-block rounded-full bg-pink-200 px-3 py-1 text-xs font-bold text-pink-700 dark:bg-pink-900/50 dark:text-pink-200">
                      {customName.badge}
                    </span>
                    <h3 className="font-display text-2xl font-bold text-slate-800 dark:text-white">{customName.name}</h3>
                    <p className="mt-2 min-h-[48px] text-slate-600 dark:text-slate-300">{customName.desc}</p>
                    <p className="mt-4 text-xl font-extrabold text-pink-500">{customName.price}</p>
                    <a
                      href={`https://wa.me/${waNumber}?text=${encodeURIComponent(`Halo saya ingin pesan ${customName.name}`)}`}
                      target="_blank"
                      rel="noreferrer"
                      className="mt-5 inline-flex rounded-full bg-slate-800 px-5 py-2.5 text-sm font-bold text-white transition group-hover:bg-pink-500 dark:bg-slate-100 dark:text-slate-900"
                    >
                      Pesan Sekarang
                    </a>
                  </article>

                  <article className="fade-item group rounded-[1.8rem] border border-white/70 bg-white/80 p-6 shadow-lg transition duration-300 hover:-translate-y-2 hover:shadow-dreamy dark:border-slate-700 dark:bg-slate-800/80 md:col-start-3">
                    <span className="mb-4 inline-block rounded-full bg-lilac px-3 py-1 text-xs font-bold text-violet-700 dark:bg-violet-900/50 dark:text-violet-200">
                      {themed.badge}
                    </span>
                    <h3 className="font-display text-2xl font-bold text-slate-800 dark:text-white">{themed.name}</h3>
                    <p className="mt-2 min-h-[48px] text-slate-600 dark:text-slate-300">{themed.desc}</p>
                    <p className="mt-4 text-xl font-extrabold text-pink-500">{themed.price}</p>
                    <a
                      href={`https://wa.me/${waNumber}?text=${encodeURIComponent(`Halo saya ingin pesan ${themed.name} dengan request tema anime, zodiak, atau mood`)}`}
                      target="_blank"
                      rel="noreferrer"
                      className="mt-5 inline-flex rounded-full bg-slate-800 px-5 py-2.5 text-sm font-bold text-white transition group-hover:bg-pink-500 dark:bg-slate-100 dark:text-slate-900"
                    >
                      Pesan Sekarang
                    </a>
                  </article>
                </div>
              </section>

              <section id="instagram" className="mx-auto max-w-5xl px-4 pb-6 md:px-6">
                <div className="fade-item rounded-[2rem] border border-pink-200/70 bg-white/85 p-6 shadow-lg dark:border-slate-700 dark:bg-slate-800/80 md:p-8">
                  <div className="flex flex-col items-start gap-4 md:flex-row md:items-center md:justify-between">
                    <div className="flex items-start gap-3 md:items-center md:gap-4">
                      <div className="grid h-14 w-14 place-items-center rounded-2xl bg-gradient-to-br from-pink-500 via-fuchsia-500 to-orange-400 text-white shadow-lg">
                        <svg viewBox="0 0 24 24" className="h-7 w-7" fill="none" stroke="currentColor" strokeWidth="2">
                          <rect x="3" y="3" width="18" height="18" rx="5"></rect>
                          <circle cx="12" cy="12" r="4"></circle>
                          <circle cx="17.5" cy="6.5" r="1"></circle>
                        </svg>
                      </div>
                      <div>
                        <p className="text-sm font-bold uppercase tracking-wider text-pink-500">Instagram Official</p>
                        <h2 className="font-display text-xl font-bold text-slate-800 dark:text-white md:text-2xl">@chibi_craft.id</h2>
                        <p className="text-sm text-slate-600 dark:text-slate-300 md:text-base">Lihat update desain terbaru, jadwal PO, dan hasil custom customer.</p>
                      </div>
                    </div>
                    <a
                      href={instagramUrl}
                      target="_blank"
                      rel="noreferrer"
                      className="inline-flex items-center gap-2 rounded-full bg-pink-500 px-6 py-3 text-sm font-bold text-white transition hover:bg-pink-600"
                    >
                      <svg viewBox="0 0 24 24" className="h-5 w-5" fill="none" stroke="currentColor" strokeWidth="2">
                        <rect x="3" y="3" width="18" height="18" rx="5"></rect>
                        <circle cx="12" cy="12" r="4"></circle>
                        <circle cx="17.5" cy="6.5" r="1"></circle>
                      </svg>
                      Kunjungi Instagram
                    </a>
                  </div>
                </div>
              </section>

              <section id="kontak" className="mx-auto max-w-4xl px-4 py-16 md:px-6">
                <div className="fade-item rounded-[2rem] border border-white/80 bg-white/80 p-6 shadow-lg dark:border-slate-700 dark:bg-slate-800/80 md:p-8">
                  <h2 className="font-display text-3xl font-bold text-slate-800 dark:text-white">Hubungi Chibi Craft</h2>
                  <p className="mt-2 text-slate-600 dark:text-slate-300">Punya request warna atau nama? Kirim pesan di bawah ini.</p>

                  <form onSubmit={onSubmit} className="mt-6 grid gap-4">
                    <input
                      type="text"
                      placeholder="Nama"
                      value={form.name}
                      onChange={(e) => setForm({ ...form, name: e.target.value })}
                      className="w-full rounded-2xl border border-pink-200 bg-white px-4 py-3 outline-none ring-pink-300 transition focus:ring-2 dark:border-slate-600 dark:bg-slate-900"
                    />
                    <input
                      type="email"
                      placeholder="Email"
                      value={form.email}
                      onChange={(e) => setForm({ ...form, email: e.target.value })}
                      className="w-full rounded-2xl border border-pink-200 bg-white px-4 py-3 outline-none ring-pink-300 transition focus:ring-2 dark:border-slate-600 dark:bg-slate-900"
                    />
                    <textarea
                      rows="4"
                      placeholder="Pesan"
                      value={form.message}
                      onChange={(e) => setForm({ ...form, message: e.target.value })}
                      className="w-full rounded-2xl border border-pink-200 bg-white px-4 py-3 outline-none ring-pink-300 transition focus:ring-2 dark:border-slate-600 dark:bg-slate-900"
                    ></textarea>
                    <button
                      type="submit"
                      className="w-fit rounded-full bg-pink-500 px-6 py-3 font-bold text-white transition hover:bg-pink-600"
                    >
                      Kirim Pesan
                    </button>
                  </form>
                </div>
              </section>
            </main>

            <footer className="border-t border-white/50 bg-white/70 px-4 py-8 text-center text-sm backdrop-blur dark:border-slate-700 dark:bg-slate-900/80">
              <div className="flex items-center justify-center gap-2">
                <img
                  src="LOGO CHIBI.jpeg"
                  alt="Logo Chibi Craft"
                  className="h-9 w-9 rounded-full border border-pink-200 object-cover dark:border-slate-600"
                />
                <p className="font-bold text-slate-700 dark:text-slate-100">Chibi Craft</p>
              </div>
              <p className="mt-1 text-slate-600 dark:text-slate-300">Handmade bracelet for little joys.</p>
              <a
                href={instagramUrl}
                target="_blank"
                rel="noreferrer"
                className="mx-auto mt-3 inline-flex items-center gap-2 rounded-full bg-pink-500 px-4 py-2 font-bold text-white transition hover:bg-pink-600"
              >
                <svg viewBox="0 0 24 24" className="h-4 w-4" fill="none" stroke="currentColor" strokeWidth="2">
                  <rect x="3" y="3" width="18" height="18" rx="5"></rect>
                  <circle cx="12" cy="12" r="4"></circle>
                  <circle cx="17.5" cy="6.5" r="1"></circle>
                </svg>
                @chibi_craft.id
              </a>
              <p className="mt-2 text-slate-500 dark:text-slate-400">© {new Date().getFullYear()} Chibi Craft. All rights reserved.</p>
            </footer>

          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
